services:
  # Backend API
  - type: web
    name: cleanpro-backend
    env: node
    region: oregon
    plan: starter
    branch: main
    rootDir: backend
    healthCheckPath: /health
    buildCommand: npm install && npx prisma generate && npx tsc
    startCommand: node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: cleanpro-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: cleanpro-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: FRONTEND_URL
        value: https://cleaning-services-enterprise-2026.vercel.app
      - key: LOG_LEVEL
        value: info
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

  # Frontend (Vercel handles this, but included for completeness)
  - type: web
    name: cleanpro-frontend
    env: node
    region: oregon
    plan: starter
    branch: main
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: cleanpro-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: cleanpro-db
    databaseName: cleaning_services
    plan: starter
